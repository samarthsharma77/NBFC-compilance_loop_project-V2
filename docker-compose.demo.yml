# ═══════════════════════════════════════════════════════════════════════════════
# ComplianceLoop — Demo Environment Overlay
#
# This file EXTENDS docker-compose.yml. It adds the demo-specific services
# and overrides certain settings for demo mode.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.demo.yml up -d
#
# What's different in demo mode:
#   - Separate demo-postgres instance (port 5433) — fully isolated from prod
#   - demo-frontend: Next.js dashboard
#   - api gets DEMO_MODE=true env var injected
#   - worker gets DEMO_MODE=true for demo-specific retro-eval behaviour
#   - demo-postgres is seeded automatically on startup
#   - Human-in-the-loop guideline review gate is bypassed
# ═══════════════════════════════════════════════════════════════════════════════

version: "3.9"

volumes:
  demo_postgres_data:
    driver: local

networks:
  internal:
    driver: bridge
    internal: true
  public:
    driver: bridge

services:

  # ── Demo PostgreSQL (completely separate from production) ─────────────────
  demo-postgres:
    image: postgres:16-alpine
    container_name: complianceloop_demo_postgres
    labels:
      - "service=demo-postgres"
    environment:
      POSTGRES_DB: ${DEMO_POSTGRES_DB:-complianceloop_demo}
      POSTGRES_USER: ${DEMO_POSTGRES_USER:-complianceloop_demo}
      POSTGRES_PASSWORD: ${DEMO_POSTGRES_PASSWORD:?DEMO_POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - demo_postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"     # Different host port from prod (5432)
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DEMO_POSTGRES_USER:-complianceloop_demo}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Demo DB migration + seeder (runs once, then exits) ────────────────────
  demo-seeder:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: complianceloop_demo_seeder
    labels:
      - "service=demo-seeder"
    env_file:
      - .env
    environment:
      # Point to demo postgres, not production
      POSTGRES_DSN: ${DEMO_POSTGRES_DSN:?DEMO_POSTGRES_DSN is required}
      DEMO_MODE: "true"
      APP_ENV: demo
    command: >
      /bin/sh -c "
        echo 'Waiting for demo-postgres...';
        sleep 5;
        echo 'Running migrations on demo DB...';
        python -m alembic upgrade head;
        echo 'Seeding demo data...';
        python db/seeds/demo_seed.py;
        echo 'Demo DB ready.';
      "
    depends_on:
      demo-postgres:
        condition: service_healthy
    networks:
      - internal
    restart: "no"           # Run once and exit

  # ── Override API to enable demo mode ──────────────────────────────────────
  api:
    environment:
      DEMO_MODE: "true"
      APP_ENV: demo
      # API needs to know about both prod and demo DSNs
      DEMO_POSTGRES_DSN: ${DEMO_POSTGRES_DSN}
      DEMO_API_KEY: ${DEMO_API_KEY:?DEMO_API_KEY is required}
    depends_on:
      demo-postgres:
        condition: service_healthy
      demo-seeder:
        condition: service_completed_successfully

  # ── Override Worker to enable demo mode ───────────────────────────────────
  worker:
    environment:
      DEMO_MODE: "true"
      APP_ENV: demo
      DEMO_POSTGRES_DSN: ${DEMO_POSTGRES_DSN}

  # ── Demo Frontend (Next.js dashboard) ─────────────────────────────────────
  demo-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_DEMO_MODE: "true"
    container_name: complianceloop_demo_frontend
    labels:
      - "service=demo-frontend"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_DEMO_MODE: "true"
      PORT: 3000
    ports:
      - "3000:3000"
    networks:
      - internal
      - public
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ── Nginx override — add demo frontend upstream ───────────────────────────
  nginx:
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/sites:/etc/nginx/conf.d:ro
      - ./infra/nginx/sites/demo.conf:/etc/nginx/conf.d/demo.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      api:
        condition: service_healthy
      demo-frontend:
        condition: service_healthy