# ═══════════════════════════════════════════════════════════════════════════════
# ComplianceLoop — Test Stack
#
# Ephemeral infrastructure for integration and E2E tests.
# Uses TestContainers in pytest, but this file is available for
# running the full integration suite manually or in CI without TestContainers.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   pytest -m integration
#   docker compose -f docker-compose.test.yml down -v
#
# Key differences from production:
#   - All ports on different numbers to avoid conflicts with running dev stack
#   - No persistent volumes (all tmpfs or anonymous volumes — wiped on down -v)
#   - Faster startup (no replication, reduced durability settings)
#   - Smaller resource limits
#   - No Nginx, Grafana, Vault (not needed for testing application logic)
# ═══════════════════════════════════════════════════════════════════════════════

version: "3.9"

networks:
  test_network:
    driver: bridge

services:

  # ── Test PostgreSQL ────────────────────────────────────────────────────────
  test-postgres:
    image: postgres:16-alpine
    container_name: complianceloop_test_postgres
    environment:
      POSTGRES_DB: complianceloop_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      # Optimised for speed over durability (fine for tests)
      POSTGRES_EXTRA_OPTS: >
        -c fsync=off
        -c synchronous_commit=off
        -c full_page_writes=off
        -c shared_buffers=128MB
        -c max_connections=50
    ports:
      - "15432:5432"          # Port 15432 to avoid conflict with dev stack on 5432
    networks:
      - test_network
    tmpfs:
      - /var/lib/postgresql/data:mode=777    # Tmpfs for speed — data lost on container stop
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d complianceloop_test"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: "no"

  # ── Test Redis ────────────────────────────────────────────────────────────
  test-redis:
    image: redis:7-alpine
    container_name: complianceloop_test_redis
    command: >
      redis-server
      --requirepass test_redis_password
      --appendonly no
      --save ""
      --loglevel warning
    ports:
      - "16379:6379"          # Port 16379 to avoid conflict
    networks:
      - test_network
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "test_redis_password", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: "no"

  # ── Test MinIO ────────────────────────────────────────────────────────────
  test-minio:
    image: minio/minio:RELEASE.2024-08-03T04-33-23Z
    container_name: complianceloop_test_minio
    command: server /data --console-address ":19001"
    environment:
      MINIO_ROOT_USER: test_minio_user
      MINIO_ROOT_PASSWORD: test_minio_password
    ports:
      - "19000:9000"          # Port 19000 to avoid conflict
      - "19001:19001"
    networks:
      - test_network
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: "no"

  # ── Test MinIO bucket init ────────────────────────────────────────────────
  test-minio-init:
    image: minio/mc:RELEASE.2024-08-01T03-43-14Z
    container_name: complianceloop_test_minio_init
    depends_on:
      test-minio:
        condition: service_healthy
    networks:
      - test_network
    entrypoint: >
      /bin/sh -c "
      mc alias set testlocal http://test-minio:9000 test_minio_user test_minio_password;
      mc mb --ignore-existing testlocal/complianceloop-audit;
      mc mb --ignore-existing testlocal/complianceloop-faiss-snapshots;
      mc mb --ignore-existing testlocal/complianceloop-raw-circulars;
      echo 'Test MinIO buckets initialised.';
      "
    restart: "no"

  # ── Migration runner (applies schema before tests run) ────────────────────
  test-migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: complianceloop_test_migrate
    environment:
      POSTGRES_DSN: postgresql+asyncpg://test_user:test_password@test-postgres:5432/complianceloop_test
      APP_ENV: test
    command: python -m alembic upgrade head
    depends_on:
      test-postgres:
        condition: service_healthy
    networks:
      - test_network
    restart: "no"